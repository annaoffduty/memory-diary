  $('#gallery-locate-btn').addEventListener('click', async ()=>{
    const q = $('#gallery-place-input').value.trim();
    if(!q){ showToast('Type a place name first, then hit Find.', true); return; }
    const btn = $('#gallery-locate-btn'); const original = btn.textContent;
    btn.textContent = 'Searching…';
    try{
      const res = await fetch('https://nominatim.openstreetmap.org/search?format=json&limit=1&q=' + encodeURIComponent(q));
      const results = await res.json();
      if(!results.length){ showToast('Could not find that place — try being more specific, or click the map.', true); return; }
      galleryEnsureMap();
      galleryPlacePin(parseFloat(results[0].lat), parseFloat(results[0].lon), q, true);
    }catch(err){
      console.error(err);
      showToast('Location search failed — you can still click the map directly.', true);
    }finally{
      btn.textContent = original;
    }
  });
  $('#gallery-clear-pin').addEventListener('click', galleryClearPin);

  $('#gallery-save-btn').addEventListener('click', async ()=>{
    const errEl = $('#gallery-error');
    errEl.style.display = 'none';
    const date = $('#gallery-date-input').value;
    const placeName = $('#gallery-place-input').value.trim();
    if(!state.galleryPhotos.length){ errEl.textContent = 'Add at least one photo (or close this).'; errEl.style.display = 'block'; return; }
    if(!date){ errEl.textContent = 'Please set a date.'; errEl.style.display = 'block'; return; }
    const title = $('#gallery-title-input').value.trim() || fmtDate(date); // fall back to the date

    // same location resolution as the regular add-memory save
    let location;
    if(state.galleryPicked && state.galleryPicked.lat != null){
      location = {...state.galleryPicked, name: placeName || state.galleryPicked.name || ''};
    } else if(placeName){
      location = {lat:null, lng:null, name: placeName};
    } else {
      location = null;
    }

    setLoading(true, 'Saving gallery…');
    try{
      const paths = await galleryUploadAndCollect();
      if(state.galleryEditingId){
        const id = state.galleryEditingId;
        const existing = state.entries.find(e=>e.id === id) || {};
        // drop any removed photos from storage
        const removed = (existing.mediaPaths || []).filter(p=> !paths.includes(p));
        for(const p of removed){ await Store.deleteMedia(p); delete state.pathCache[p]; }
        const entryObj = { ...existing, id, type: 'photo', title, date, location, mediaKey: null, mediaType: null, mediaPaths: paths };
        await Store.updateEntry(id, entryObj);
        const idx = state.entries.findIndex(e=>e.id === id);
        if(idx >= 0) state.entries[idx] = entryObj;
        setLoading(false);
        galleryOverlay.classList.remove('active');
        showToast('Gallery updated.');
      } else {
        const id = crypto.randomUUID();
        const entryObj = { id, type: 'photo', title, text: '', date, location, mediaKey: null, mediaType: null, mediaPaths: paths, isMemory: false, mood: null, createdAt: null };
        entryObj.createdAt = await Store.insertEntry(entryObj, state.userId);
        state.entries.push(entryObj);
        setLoading(false);
        galleryOverlay.classList.remove('active');
        showToast(`Imported ${paths.length} photo${paths.length === 1 ? '' : 's'} as one memory.`);
      }
      renderTimeline();
      if(state.view === 'map') renderMap();
      if(state.view === 'corner') renderMemoryCorner();
    }catch(err){
      console.error(err);
      setLoading(false);
      errEl.textContent = 'Could not save: ' + (err.message || 'please try again.');
      errEl.style.display = 'block';
    }
  });

  $('#gallery-delete-btn').addEventListener('click', async ()=>{
    if(!state.galleryEditingId) return;
    if(!confirm('Delete this photo gallery? This cannot be undone.')) return;
    const id = state.galleryEditingId;
    galleryOverlay.classList.remove('active');
    await deleteEntryById(id);
  });

  $('#gallery-modal-close').addEventListener('click', ()=> galleryOverlay.classList.remove('active'));
  galleryOverlay.addEventListener('click', (e)=>{ if(e.target === galleryOverlay) galleryOverlay.classList.remove('active'); });

  // ---------------- init ----------------
  setAuthMode('login');

  // If there's already a valid Supabase session (e.g. page refresh),
  // log the person straight back in instead of showing the auth screen.
  (async ()=>{
    setLoading(true, 'Checking for an existing session…');
    const { data } = await sb.auth.getSession();
    if(data && data.session){
      const user = data.session.user;
      const username = (user.user_metadata && user.user_metadata.username) || user.email.split('@')[0];
      const displayName = (user.user_metadata && user.user_metadata.display_name) || username;
      await enterApp(username, displayName, user.id, user.user_metadata);
    } else {
      setLoading(false);
    }
  })();
})();
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(e => console.log('SW registration failed:', e));
    });
  }
</script>
</body>
</html>
